name: Swift Package Tests

on:
  push:
    paths:
      - "Apps/**"
      - "Packages/**"
      - "scripts/test-swift.sh"
  pull_request:
    paths:
      - "Apps/**"
      - "Packages/**"
      - "scripts/test-swift.sh"

jobs:
  test:
    name: Run Swift Package Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Swift package tests
        run: ./scripts/test-swift.sh
